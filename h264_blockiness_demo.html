<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.264 块效应可视化 — 诊断与修复</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --red: #f85149; --green: #3fb950; --orange: #d29922; --purple: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Cascadia Code', monospace; line-height: 1.5; }
.header { padding: 32px 40px 24px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: var(--muted); margin-top: 8px; font-size: 14px; }

.diagnosis-tree { padding: 24px 40px; border-bottom: 1px solid var(--border); }
.diagnosis-tree h2 { font-size: 16px; color: var(--accent); margin-bottom: 16px; }
.tree-node { display: flex; align-items: center; gap: 10px; padding: 8px 14px; margin: 4px 0; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 13px; }
.tree-node:hover { background: rgba(88,166,255,0.1); }
.tree-node.active { background: rgba(88,166,255,0.15); border: 1px solid var(--accent); }
.tree-icon { font-size: 16px; flex-shrink: 0; }
.tree-label { flex: 1; }
.tree-fix { color: var(--green); font-size: 11px; opacity: 0.7; }

.tabs { display: flex; gap: 0; padding: 0 40px; border-bottom: 1px solid var(--border); }
.tab { padding: 12px 20px; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 220px); }
.sidebar { padding: 24px; border-right: 1px solid var(--border); overflow-y: auto; }
.canvas-area { padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

.control-group { margin-bottom: 20px; }
.control-group h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.control-row label { font-size: 12px; color: var(--text); min-width: 100px; }
.control-row input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; }
.control-row .val { font-size: 11px; color: var(--accent); min-width: 40px; text-align: right; }
.control-row select { flex: 1; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: inherit; }

.btn-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.btn { padding: 6px 14px; font-size: 11px; font-family: inherit; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.2s; }
.btn:hover { border-color: var(--accent); }
.btn.active { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }
.btn-fix { border-color: var(--green); color: var(--green); }
.btn-fix:hover { background: rgba(63,185,80,0.1); }

.canvas-wrap { position: relative; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #000; }
.canvas-wrap canvas { display: block; }
.canvas-label { position: absolute; top: 8px; padding: 3px 10px; border-radius: 4px; font-size: 11px; background: rgba(0,0,0,0.7); }
.canvas-label.left { left: 8px; color: var(--accent); }
.canvas-label.right { right: 8px; color: var(--green); }

.side-by-side { display: flex; gap: 2px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.side-by-side .canvas-wrap { border: none; border-radius: 0; }
.slider-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); left: 50%; pointer-events: none; z-index: 2; }
.slider-handle { position: absolute; top: 50%; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); left: 50%; transform: translate(-50%,-50%); cursor: ew-resize; z-index: 3; display: flex; align-items: center; justify-content: center; font-size: 14px; }

.info-panel { padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; max-width: 720px; width: 100%; }
.info-panel h3 { font-size: 14px; color: var(--accent); margin-bottom: 8px; }
.info-panel p { font-size: 12px; color: var(--muted); line-height: 1.8; }
.info-panel .highlight { color: var(--green); }
.info-panel .warn { color: var(--orange); }
.info-panel code { background: rgba(88,166,255,0.1); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--accent); }
.info-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.info-tab { padding: 4px 12px; font-size: 11px; border-radius: 3px; cursor: pointer; background: transparent; color: var(--muted); border: 1px solid transparent; font-family: inherit; }
.info-tab:hover { color: var(--text); }
.info-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(88,166,255,0.08); }

.qp-meter { display: flex; gap: 2px; margin: 12px 0; }
.qp-block { width: 12px; height: 20px; border-radius: 2px; transition: background 0.3s; }

.macro-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <h1>H.264 块效应可视化</h1>
  <p>交互式诊断：识别块效应类型 → 理解成因 → 调参修复</p>
</div>

<div class="diagnosis-tree">
  <h2>诊断决策树</h2>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
    <div class="tree-node active" data-scenario="overall" onclick="setScenario('overall')">
      <span class="tree-icon">◼</span>
      <span class="tree-label">整体方块模糊</span>
      <span class="tree-fix">↓ MaxQp / ↑ BitRate</span>
    </div>
    <div class="tree-node" data-scenario="motion" onclick="setScenario('motion')">
      <span class="tree-icon">🏃</span>
      <span class="tree-label">运动区域方块明显</span>
      <span class="tree-fix">VBR + 合理 MaxBitRate</span>
    </div>
    <div class="tree-node" data-scenario="intra" onclick="setScenario('intra')">
      <span class="tree-icon">▤</span>
      <span class="tree-label">Intra 帧边界方块</span>
      <span class="tree-fix">↓ IDR间隔 / α_c0=-2</span>
    </div>
    <div class="tree-node" data-scenario="ringing" onclick="setScenario('ringing')">
      <span class="tree-icon">〰</span>
      <span class="tree-label">边缘振铃/过冲</span>
      <span class="tree-fix">↑ BitRate (非块效应)</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="control-group">
      <h3>量化参数</h3>
      <div class="control-row">
        <label>QP 值</label>
        <input type="range" id="qp" min="10" max="51" value="36">
        <span class="val" id="qp-val">36</span>
      </div>
      <div class="qp-meter" id="qp-meter"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;">
        <span style="color:var(--green)">10-28 优质</span> ·
        <span style="color:var(--orange)">28-36 可接受</span> ·
        <span style="color:var(--red)">36+ 块效应明显</span>
      </div>
    </div>

    <div class="control-group">
      <h3>编码控制</h3>
      <div class="control-row">
        <label>码率模式</label>
        <select id="rc-mode" onchange="render()">
          <option value="cbr">CBR 恒定码率</option>
          <option value="vbr">VBR 可变码率</option>
        </select>
      </div>
      <div class="control-row">
        <label>目标码率</label>
        <input type="range" id="bitrate" min="200" max="4000" value="1500" step="100">
        <span class="val" id="bitrate-val">1500k</span>
      </div>
      <div class="control-row">
        <label>MaxQP</label>
        <input type="range" id="maxqp" min="20" max="51" value="42">
        <span class="val" id="maxqp-val">42</span>
      </div>
      <div class="control-row">
        <label>IDR 间隔</label>
        <input type="range" id="idr-interval" min="1" max="120" value="30">
        <span class="val" id="idr-val">30</span>
      </div>
    </div>

    <div class="control-group">
      <h3>Deblocking Filter</h3>
      <div class="control-row">
        <label>去块滤波</label>
        <select id="deblock-enable" onchange="render()">
          <option value="1">启用</option>
          <option value="0">禁用</option>
        </select>
      </div>
      <div class="control-row">
        <label>α·c0 偏移</label>
        <input type="range" id="alpha-c0" min="-6" max="6" value="0">
        <span class="val" id="alpha-val">0</span>
      </div>
      <div class="control-row">
        <label>β 偏移</label>
        <input type="range" id="beta-offset" min="-6" max="6" value="0">
        <span class="val" id="beta-val">0</span>
      </div>
    </div>

    <div class="control-group">
      <h3>显示选项</h3>
      <div class="btn-row">
        <button class="btn active" id="btn-compare" onclick="setView('compare')">修复对比</button>
        <button class="btn" id="btn-macro" onclick="setView('macro')">宏块网格</button>
        <button class="btn" id="btn-heatmap" onclick="setView('heatmap')">QP热力图</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="toggleZoom()">Zoom 2x</button>
        <button class="btn" onclick="toggleMotion()">运动模拟</button>
      </div>
    </div>

    <div class="control-group">
      <h3>快速修复</h3>
      <div class="btn-row">
        <button class="btn btn-fix" onclick="applyFix('quality')">画质优先</button>
        <button class="btn btn-fix" onclick="applyFix('bandwidth')">带宽优先</button>
        <button class="btn btn-fix" onclick="applyFix('balanced')">平衡模式</button>
      </div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="side-by-side" id="canvas-container">
      <div class="canvas-wrap">
        <canvas id="canvas-before" width="360" height="270"></canvas>
        <span class="canvas-label left">原始 / 块效应</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="canvas-after" width="360" height="270"></canvas>
        <span class="canvas-label right">修复后</span>
      </div>
    </div>

    <div class="info-panel" id="info-panel">
      <div class="info-tabs">
        <button class="info-tab active" onclick="setInfoTab('cause')">成因分析</button>
        <button class="info-tab" onclick="setInfoTab('fix')">修复方案</button>
        <button class="info-tab" onclick="setInfoTab('code')">板端代码</button>
      </div>
      <div id="info-content"></div>
    </div>
  </div>
</div>

<script>
// ====== State ======
let state = {
  scenario: 'overall',
  view: 'compare',
  zoom: 1,
  motionOn: false,
  motionT: 0,
  infoTab: 'cause',
  qp: 36, bitrate: 1500, maxqp: 42, idrInterval: 30,
  rcMode: 'cbr',
  deblockEnable: 1, alphaC0: 0, betaOffset: 0
};

// ====== Source Image Generation ======
function generateScene(ctx, w, h, t) {
  const img = ctx.createImageData(w, h);
  const d = img.data;
  const MB = 16;
  const qp = state.qp;
  const quantScale = Math.max(0, (qp - 10) / 41); // 0..1

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r, g, b;

      if (state.scenario === 'overall') {
        // Smooth gradient with subtle texture
        r = 80 + 60 * Math.sin(x / w * Math.PI) + 20 * Math.sin(y / h * 2 * Math.PI);
        g = 60 + 50 * Math.cos(x / w * Math.PI * 0.7);
        b = 100 + 70 * Math.sin((x + y) / (w + h) * Math.PI * 1.5);
        // Fine texture
        r += 10 * Math.sin(x * 0.8) * Math.cos(y * 0.6);
        g += 8 * Math.cos(x * 0.5 + y * 0.4);
        b += 12 * Math.sin(x * 0.3 - y * 0.7);
      } else if (state.scenario === 'motion') {
        // Static background + moving object
        const objCx = w * 0.5 + Math.sin(t * 0.02) * 60;
        const objCy = h * 0.5 + Math.cos(t * 0.03) * 40;
        const dist = Math.sqrt((x - objCx) ** 2 + (y - objCy) ** 2);
        if (dist < 40) {
          r = 180 + 40 * Math.sin(dist * 0.2);
          g = 60 + 30 * Math.cos(dist * 0.3);
          b = 40;
        } else {
          r = 50 + 20 * Math.sin(x * 0.02);
          g = 70 + 15 * Math.cos(y * 0.03);
          b = 90 + 20 * Math.sin((x + y) * 0.01);
        }
      } else if (state.scenario === 'intra') {
        // Detailed area transitioning at I-frame boundaries
        const stripePhase = Math.floor(t * 0.01) % 4;
        r = 70 + 50 * Math.sin(x / w * 8 * Math.PI + stripePhase);
        g = 80 + 60 * Math.cos(y / h * 6 * Math.PI);
        b = 60 + 40 * Math.sin((x + y) * 0.05);
        // Add fine detail that needs intra coding
        r += 15 * Math.sin(x * 1.2 + y * 0.8);
        g += 12 * Math.cos(x * 0.9 - y * 1.1);
        b += 18 * Math.sin(x * 0.7 + y * 1.3);
      } else { // ringing
        // Sharp edges — high frequency content
        const edge1 = Math.abs(x - w * 0.3) < 2 ? 1 : 0;
        const edge2 = Math.abs(y - h * 0.6) < 2 ? 1 : 0;
        const edge3 = Math.abs(Math.sqrt((x - w * 0.7) ** 2 + (y - h * 0.4) ** 2) - 50) < 2 ? 1 : 0;
        r = 60 + edge1 * 180 + edge3 * 100;
        g = 50 + edge2 * 160 + edge3 * 80;
        b = 70 + edge1 * 120 + edge2 * 100;
      }

      const idx = (y * w + x) * 4;
      d[idx] = Math.max(0, Math.min(255, r));
      d[idx + 1] = Math.max(0, Math.min(255, g));
      d[idx + 2] = Math.max(0, Math.min(255, b));
      d[idx + 3] = 255;
    }
  }
  return img;
}

// ====== Block Effect Simulation ======
function applyBlockiness(imgData, w, h, qp, mode) {
  const d = imgData.data;
  const MB = 16;
  const qs = Math.pow(2, (qp - 10) / 5); // quantization step
  const out = new Uint8ClampedArray(d);

  for (let mby = 0; mby < Math.ceil(h / MB); mby++) {
    for (let mbx = 0; mbx < Math.ceil(w / MB); mbx++) {
      // Compute MB average and apply quantization per channel
      let sr = 0, sg = 0, sb = 0, count = 0;
      const x0 = mbx * MB, y0 = mby * MB;
      const x1 = Math.min(x0 + MB, w), y1 = Math.min(y0 + MB, h);

      for (let y = y0; y < y1; y++) {
        for (let x = x0; x < x1; x++) {
          const idx = (y * w + x) * 4;
          sr += d[idx]; sg += d[idx + 1]; sb += d[idx + 2];
          count++;
        }
      }
      sr /= count; sg /= count; sb /= count;

      // Quantize the MB average — creates block boundary jumps
      const qR = Math.round(sr / qs) * qs;
      const qG = Math.round(sg / qs) * qs;
      const qB = Math.round(sb / qs) * qs;

      let blockSize = MB;
      if (state.scenario === 'motion') {
        const objCx = w * 0.5;
        const objCy = h * 0.5;
        const mbCx = x0 + MB / 2, mbCy = y0 + MB / 2;
        const dist = Math.sqrt((mbCx - objCx) ** 2 + (mbCy - objCy) ** 2);
        if (dist < 60) {
          blockSize = 8; // Motion area has finer but still visible blocks
        }
      }

      // Apply quantized color with sub-block structure
      const subBlocks = blockSize < MB ? 2 : 1;
      const subSize = MB / subBlocks;

      for (let sy = 0; sy < subBlocks; sy++) {
        for (let sx = 0; sx < subBlocks; sx++) {
          let ssr = 0, ssg = 0, ssb = 0, sc = 0;
          const sx0 = x0 + sx * subSize, sy0 = y0 + sy * subSize;
          const sx1 = Math.min(sx0 + subSize, w), sy1 = Math.min(sy0 + subSize, h);

          for (let y = sy0; y < sy1; y++) {
            for (let x = sx0; x < sx1; x++) {
              const idx = (y * w + x) * 4;
              ssr += d[idx]; ssg += d[idx + 1]; ssb += d[idx + 2];
              sc++;
            }
          }
          ssr /= sc; ssg /= sc; ssb /= sc;
          const sqR = Math.round(ssr / qs) * qs;
          const sqG = Math.round(ssg / qs) * qs;
          const sqB = Math.round(ssb / qs) * qs;

          for (let y = sy0; y < sy1; y++) {
            for (let x = sx0; x < sx1; x++) {
              const idx = (y * w + x) * 4;
              // Blend quantized + original with residual noise
              const blend = Math.min(1, (qp - 10) / 30);
              out[idx] = Math.round(d[idx] * (1 - blend) + sqR * blend);
              out[idx + 1] = Math.round(d[idx + 1] * (1 - blend) + sqG * blend);
              out[idx + 2] = Math.round(d[idx + 2] * (1 - blend) + sqB * blend);
            }
          }
        }
      }
    }
  }
  return new ImageData(out, w, h);
}

// ====== Deblocking Simulation ======
function applyDeblocking(imgData, w, h, alphaC0, betaOffset) {
  if (state.deblockEnable === 0) return imgData;
  const d = new Uint8ClampedArray(imgData.data);
  const MB = 16;
  const strength = Math.max(0, (2 - alphaC0)); // negative alphaC0 = stronger filtering
  const betaStr = Math.max(0, (2 - betaOffset));

  // Horizontal boundaries (between MB rows)
  for (let mby = 1; mby < Math.ceil(h / MB); mby++) {
    const by = mby * MB;
    if (by >= h) continue;
    for (let x = 0; x < w; x++) {
      const idxA = ((by - 1) * w + x) * 4;
      const idxB = (by * w + x) * 4;
      for (let c = 0; c < 3; c++) {
        const diff = Math.abs(d[idxA + c] - d[idxB + c]);
        const threshold = 10 + betaStr * 8;
        if (diff < threshold * strength) {
          const avg = (d[idxA + c] + d[idxB + c]) / 2;
          const filterStrength = Math.min(1, strength * 0.6 * (1 - diff / (threshold * Math.max(1, strength))));
          d[idxA + c] = Math.round(d[idxA + c] * (1 - filterStrength) + avg * filterStrength);
          d[idxB + c] = Math.round(d[idxB + c] * (1 - filterStrength) + avg * filterStrength);
          // Extend filtering to p1/q1
          if (filterStrength > 0.3) {
            if (by - 2 >= 0) {
              const idxP1 = ((by - 2) * w + x) * 4;
              const fs2 = filterStrength * 0.3;
              d[idxP1 + c] = Math.round(d[idxP1 + c] * (1 - fs2) + avg * fs2);
            }
            if (by + 1 < h) {
              const idxQ1 = ((by + 1) * w + x) * 4;
              const fs2 = filterStrength * 0.3;
              d[idxQ1 + c] = Math.round(d[idxQ1 + c] * (1 - fs2) + avg * fs2);
            }
          }
        }
      }
    }
  }

  // Vertical boundaries (between MB columns)
  for (let mbx = 1; mbx < Math.ceil(w / MB); mbx++) {
    const bx = mbx * MB;
    if (bx >= w) continue;
    for (let y = 0; y < h; y++) {
      const idxA = (y * w + bx - 1) * 4;
      const idxB = (y * w + bx) * 4;
      for (let c = 0; c < 3; c++) {
        const diff = Math.abs(d[idxA + c] - d[idxB + c]);
        const threshold = 10 + betaStr * 8;
        if (diff < threshold * strength) {
          const avg = (d[idxA + c] + d[idxB + c]) / 2;
          const filterStrength = Math.min(1, strength * 0.6 * (1 - diff / (threshold * Math.max(1, strength))));
          d[idxA + c] = Math.round(d[idxA + c] * (1 - filterStrength) + avg * filterStrength);
          d[idxB + c] = Math.round(d[idxB + c] * (1 - filterStrength) + avg * filterStrength);
          if (filterStrength > 0.3) {
            if (bx - 2 >= 0) {
              const idxP1 = (y * w + bx - 2) * 4;
              const fs2 = filterStrength * 0.3;
              d[idxP1 + c] = Math.round(d[idxP1 + c] * (1 - fs2) + avg * fs2);
            }
            if (bx + 1 < w) {
              const idxQ1 = (y * w + bx + 1) * 4;
              const fs2 = filterStrength * 0.3;
              d[idxQ1 + c] = Math.round(d[idxQ1 + c] * (1 - fs2) + avg * fs2);
            }
          }
        }
      }
    }
  }
  return new ImageData(d, w, h);
}

// ====== Ringing Simulation ======
function applyRinging(imgData, w, h, qp) {
  if (state.scenario !== 'ringing') return imgData;
  const d = new Uint8ClampedArray(imgData.data);
  const strength = Math.max(0, (qp - 20) / 31);

  // Add overshoot/undershoot near edges
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const idx = (y * w + x) * 4;
      for (let c = 0; c < 3; c++) {
        const left = d[((y) * w + x - 1) * 4 + c];
        const right = d[((y) * w + x + 1) * 4 + c];
        const up = d[((y - 1) * w + x) * 4 + c];
        const down = d[((y + 1) * w + x) * 4 + c];
        const center = d[idx + c];
        // Detect edge: large gradient
        const gx = Math.abs(right - left);
        const gy = Math.abs(down - up);
        if (gx > 60 || gy > 60) {
          const overshoot = strength * 25 * Math.sin(x * 0.5) * Math.cos(y * 0.5);
          d[idx + c] = Math.max(0, Math.min(255, center + overshoot));
        }
      }
    }
  }
  return new ImageData(d, w, h);
}

// ====== Macroblock Grid Overlay ======
function drawMacroGrid(ctx, w, h) {
  const MB = 16;
  const qp = state.qp;
  ctx.strokeStyle = qp > 36 ? 'rgba(248,81,73,0.5)' : qp > 28 ? 'rgba(210,153,34,0.4)' : 'rgba(63,185,80,0.3)';
  ctx.lineWidth = 0.5;

  for (let x = 0; x <= w; x += MB) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = 0; y <= h; y += MB) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Show QP value per MB
  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let mby = 0; mby < Math.ceil(h / MB); mby++) {
    for (let mbx = 0; mbx < Math.ceil(w / MB); mbx++) {
      let mbqp = qp;
      if (state.scenario === 'motion') {
        const objCx = w * 0.5, objCy = h * 0.5;
        const dist = Math.sqrt((mbx * MB + 8 - objCx) ** 2 + (mby * MB + 8 - objCy) ** 2);
        mbqp = dist < 60 ? Math.min(51, qp + 5) : Math.max(10, qp - 8);
      }
      if (state.scenario === 'intra') {
        mbqp = (mbx + mby) % 4 === 0 ? Math.min(51, qp + 4) : qp;
      }
      ctx.fillText(mbqp, mbx * MB + 2, mby * MB + 10);
    }
  }
}

// ====== QP Heatmap ======
function drawQPHeatmap(ctx, w, h) {
  const MB = 16;
  for (let mby = 0; mby < Math.ceil(h / MB); mby++) {
    for (let mbx = 0; mbx < Math.ceil(w / MB); mbx++) {
      let mbqp = state.qp;
      if (state.scenario === 'motion') {
        const objCx = w * 0.5, objCy = h * 0.5;
        const dist = Math.sqrt((mbx * MB + 8 - objCx) ** 2 + (mby * MB + 8 - objCy) ** 2);
        mbqp = dist < 60 ? Math.min(51, state.qp + 5) : Math.max(10, state.qp - 8);
      }
      if (state.scenario === 'intra') {
        mbqp = (mbx + mby) % 4 === 0 ? Math.min(51, state.qp + 4) : state.qp;
      }
      const norm = (mbqp - 10) / 41;
      const r = norm > 0.5 ? 255 : Math.round(norm * 2 * 255);
      const g = norm < 0.5 ? Math.round(norm * 2 * 255) : Math.round((1 - norm) * 2 * 255);
      ctx.fillStyle = `rgba(${r},${g},0,0.6)`;
      ctx.fillRect(mbx * MB, mby * MB, MB, MB);
      ctx.fillStyle = '#fff';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(mbqp, mbx * MB + 8, mby * MB + 12);
    }
  }
  ctx.textAlign = 'start';
}

// ====== Main Render ======
function render() {
  const cw = 360, ch = 270;
  const c1 = document.getElementById('canvas-before');
  const c2 = document.getElementById('canvas-after');
  const ctx1 = c1.getContext('2d');
  const ctx2 = c2.getContext('2d');

  if (state.zoom > 1) {
    c1.width = c2.width = cw * 2;
    c1.height = c2.height = ch * 2;
    c1.style.width = c2.style.width = cw + 'px';
    c1.style.height = c2.style.height = ch + 'px';
  } else {
    c1.width = c2.width = cw;
    c1.height = c2.height = ch;
    c1.style.width = c2.style.width = '';
    c1.style.height = c2.style.height = '';
  }

  const w = c1.width, h = c1.height;

  // Generate source
  let src = generateScene(ctx1, w, h, state.motionT);

  // Before: with blockiness
  let blocked = applyBlockiness(src, w, h, state.qp, state.scenario);
  blocked = applyRinging(blocked, w, h, state.qp);
  ctx1.putImageData(blocked, 0, 0);

  // After: with fix applied (lower QP simulation + deblocking)
  const fixQp = Math.min(state.qp, state.maxqp);
  let fixed = applyBlockiness(src, w, h, fixQp, state.scenario);
  fixed = applyDeblocking(fixed, w, h, state.alphaC0, state.betaOffset);
  fixed = applyRinging(fixed, w, h, fixQp);
  ctx2.putImageData(fixed, 0, 0);

  // Overlays
  if (state.view === 'macro') {
    drawMacroGrid(ctx1, w, h);
    drawMacroGrid(ctx2, w, h);
  } else if (state.view === 'heatmap') {
    drawQPHeatmap(ctx1, w, h);
    drawQPHeatmap(ctx2, w, h);
  }

  updateInfo();
  updateQPMeter();
}

// ====== QP Meter ======
function updateQPMeter() {
  const meter = document.getElementById('qp-meter');
  meter.innerHTML = '';
  for (let i = 10; i <= 51; i += 2) {
    const block = document.createElement('div');
    block.className = 'qp-block';
    const norm = (i - 10) / 41;
    const r = norm > 0.5 ? 255 : Math.round(norm * 2 * 255);
    const g = norm < 0.5 ? Math.round(norm * 2 * 255) : Math.round((1 - norm) * 2 * 255);
    block.style.background = `rgb(${r},${g},0)`;
    block.style.opacity = i <= state.qp ? '1' : '0.15';
    if (i === state.qp || i === state.qp - 1) {
      block.style.outline = '2px solid white';
      block.style.zIndex = '1';
    }
    meter.appendChild(block);
  }
}

// ====== Info Panel Content ======
const infoData = {
  overall: {
    cause: `整体方块模糊的根本原因是 <code>QP 过高</code>。每个宏块独立量化，QP 越大，量化步长越长，相邻宏块边界处像素值跳变越明显。<br><br>关键阈值：<br>• QP 10-28：几乎无块效应。<br>• QP 28-36：静止区域可接受，运动区域开始出现。<br>• QP 36+：方块伪影肉眼可见。<br>• QP 42+：严重马赛克。<br><br>板端常见原因：码率设置过低 → RC 模式被迫抬高 QP → 整帧方块。`,
    fix: `<b>方案1：提高码率</b>（最直接）<br>CBR 模式下 bitrate 从 1500k 提到 2500k，QP 自然下降。<br><br><b>方案2：限制 MaxQP</b>（保底）<br>设置 <code>MaxQP=36</code>，即使码率不够也不让 QP 突破阈值。<br>代价：瞬时码率可能超标，需确保网络带宽。<br><br><b>方案3：切换 VBR</b>（灵活）<br>静止场景省码率，运动场景自动加码率。<br><br><b>方案4：加强 Deblocking</b>（辅助）<br>设置 <code>alpha_c0_offset=-2</code>，边界更平滑，但不能根治。`,
    code: `// IMP 编码器典型配置\nstEncChnAttr.stRcAttr.enRcMode = IMP_ENC_RC_MODE_CBR;\nstEncChnAttr.stRcAttr.stCbrAttr.u32BitRate = 2500;  // 提高码率\nstEncChnAttr.stRcAttr.stCbrAttr.u32MaxQp = 36;      // 限制最大QP\nstEncChnAttr.stRcAttr.stCbrAttr.u32MinQp = 10;      // 限制最小QP\n\n// x264 风格\nparam->rc.i_bitrate = 2500;\nparam->rc.i_qp_max = 36;\nparam->rc.i_qp_min = 10;\nparam->deblocking = 1;\nparam->i_deblocking_alpha_c0 = -2;  // 加强滤波\nparam->i_deblocking_beta = -2;`
  },
  motion: {
    cause: `运动区域方块明显，静止区域正常，说明问题是 <code>码率分配不合理</code>。<br><br>CBR 模式下码率均匀分配，但运动区域需要更多比特：<br>• 静止区域：P帧残差接近0，几乎不消耗码率。<br>• 运动区域：残差大，QP 被迫抬高来压缩。<br>• 结果：运动区域 QP 可能比静止区域高 10-15。<br><br>本质：固定饺子分給所有人，干体力活的人吃不饱。`,
    fix: `<b>方案1：VBR 模式</b>（推荐）<br>运动时自动加码率，静止时节省。<code>MaxBitRate=3000</code>+<code>MinBitRate=500</code><br><br><b>方案2：CBR + 合理码率</b><br>如果是 CBR 不能改，把目标码率设高到能覆盖运动峰值。<br><br><b>方案3：改善运动估计</b><br>搜索范围不够导致残差大→QP高。x264 可调 <code>me=umh</code>+<code>subme=7</code>。<br>板端编码器通常有限，但 IP 帧比例可调。<br><br><b>方案4：运动区域加强 Deblocking</b>（辅助）`,
    code: `// IMP VBR 配置\nstEncChnAttr.stRcAttr.enRcMode = IMP_ENC_RC_MODE_VBR;\nstEncChnAttr.stRcAttr.stVbrAttr.u32MaxBitRate = 3000;\nstEncChnAttr.stRcAttr.stVbrAttr.u32MinBitRate = 500;\nstEncChnAttr.stRcAttr.stVbrAttr.u32MaxQp = 38;\n\n// x264 VBR\nparam->rc.i_rc_method = X264_RC_CRF;  // CRF更智能\nparam->rc.f_rf_constant = 23;         // 质量目标\nparam->rc.i_vbv_max_bitrate = 3000;   // 峰值限制\nparam->analyse.i_me_method = X264_ME_UMH;\nparam->analyse.i_subpel_refine = 7;`
  },
  intra: {
    cause: `Intra 帧边界方块出现在 <code>IDR 帧间隔太长</code> 或 <code>I宏块边界</code>。<br><br>原理：<br>• IDR 帧全部是 Intra 宏块，预测误差大，残留边界明显。<br>• IDR 间隔越长，P帧漂移积累越多，下一个IDR的残差突变越大。<br>• Intra 宏块的 Bs=3（最强滤波等级），但高 QP 下де块滤波也不够。<br><br>表现：每隔 N 秒出现一次"闪方块"，然后逐渐恢复。`,
    fix: `<b>方案1：缩短 IDR 间隔</b>（最有效）<br>从 30 帧降到 15 帧，减少 P 帧漂移积累。<br>代价：码率略上升（I帧比P帧大3-5倍）。<br><br><b>方案2：I帧 QP 偏移</b><br>I帧 QP 比P帧低 2-3，保证 I 帧质量。<br><code>qp_offset_i = -2</code><br><br><b>方案3：加强 Intra 边界 Deblocking</b><br>Intra 块 Bs=3 已经最强，但可以整体加强：<br><code>alpha_c0_offset=-2</code>`,
    code: `// IMP IDR 间隔配置\nstEncChnAttr.stRcAttr.stCbrAttr.u32IdrInterval = 15; // 从30降到15\n\n// x264 配置\nparam->keyint_max = 15;           // 最大IDR间隔\nparam->keyint_min = 10;           // 最小IDR间隔\nparam->i_scenecut_threshold = 40;  // 场景切换自动插入IDR\nparam->rc.i_qp_offset_i = -2;     // I帧QP偏移\nparam->i_deblocking_alpha_c0 = -2;\nparam->i_deblocking_beta = -1;`
  },
  ringing: {
    cause: `边缘振铃/过冲 <span class="warn">不是块效应</span>，deblocking 对它无效！<br><br>原理：<br>• 图像边缘是高频信号（突变）。<br>• H.264 用 4x4 整数 DCT 变换，量化会截断高频系数。<br>• 截断后的反变换在边缘附近产生 Gibbs 现象：过冲(overshoot)和振铃(ringing)。<br>• QP 越高，截断越多，振铃越明显。<br><br>表现：锐利边缘旁出现"鬼影"或"光环"，和块效应的方块完全不同。`,
    fix: `<b>核心：这个只能靠提高码率解决。</b><br><br><b>方案1：提高码率</b>（唯一根治方法）<br>保留更多高频系数 → 减少振铃。<br><br><b>方案2：降低 QP</b>（同方案1）<br>限制 MaxQP 让高频系数不被过度截断。<br><br><b>方案3：预处理加低通</b>（损失锐度）<br>编码前对源做轻微模糊，减少高频内容。<br>代价：本来就锐利的边缘变软。<br><br><b class="warn">⚠ 切勿盲目加强 Deblocking</b><br>Deblocking 只作用于宏块边界，对边缘振铃毫无效果。`,
    code: `// 解决振铃：提高码率 + 限制QP\nstEncChnAttr.stRcAttr.enRcMode = IMP_ENC_RC_MODE_VBR;\nstEncChnAttr.stRcAttr.stVbrAttr.u32MaxBitRate = 3000;\nstEncChnAttr.stRcAttr.stVbrAttr.u32MaxQp = 32;  // 关键：不让QP过高\n\n// x264\nparam->rc.i_bitrate = 3000;\nparam->rc.i_qp_max = 32;        // 限制QP截断\nparam->analyse.b_transform_8x8 = 1; // 8x8变换保留更多高频\nparam->rc.f_rf_constant = 20;     // 更高质量CRF\n\n// 预处理（如需）\n// 源先做轻微高斯模糊 σ=0.8\n// 代价：边缘变软`
  }
};

function updateInfo() {
  const content = document.getElementById('info-content');
  const data = infoData[state.scenario];
  if (!data) return;
  const tab = state.infoTab;
  content.innerHTML = data[tab] || data.cause;
}

// ====== UI Handlers ======
function setScenario(s) {
  state.scenario = s;
  document.querySelectorAll('.tree-node').forEach(n => n.classList.toggle('active', n.dataset.scenario === s));
  render();
}

function setView(v) {
  state.view = v;
  document.querySelectorAll('.btn-row .btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + v).classList.add('active');
  render();
}

function setInfoTab(t) {
  state.infoTab = t;
  document.querySelectorAll('.info-tab').forEach(b => b.classList.toggle('active', b.textContent.includes({cause:'成因',fix:'修复',code:'板端'}[t])));
  updateInfo();
}

function toggleZoom() {
  state.zoom = state.zoom === 1 ? 2 : 1;
  render();
}

function toggleMotion() {
  state.motionOn = !state.motionOn;
}

function applyFix(preset) {
  if (preset === 'quality') {
    state.qp = 24; state.bitrate = 3000; state.maxqp = 30;
    state.rcMode = 'vbr'; state.deblockEnable = 1;
    state.alphaC0 = -2; state.betaOffset = -2; state.idrInterval = 15;
  } else if (preset === 'bandwidth') {
    state.qp = 36; state.bitrate = 1000; state.maxqp = 40;
    state.rcMode = 'cbr'; state.deblockEnable = 1;
    state.alphaC0 = -3; state.betaOffset = -2; state.idrInterval = 30;
  } else {
    state.qp = 30; state.bitrate = 2000; state.maxqp = 36;
    state.rcMode = 'vbr'; state.deblockEnable = 1;
    state.alphaC0 = -1; state.betaOffset = -1; state.idrInterval = 20;
  }
  syncUI();
  render();
}

function syncUI() {
  document.getElementById('qp').value = state.qp;
  document.getElementById('qp-val').textContent = state.qp;
  document.getElementById('bitrate').value = state.bitrate;
  document.getElementById('bitrate-val').textContent = state.bitrate + 'k';
  document.getElementById('maxqp').value = state.maxqp;
  document.getElementById('maxqp-val').textContent = state.maxqp;
  document.getElementById('idr-interval').value = state.idrInterval;
  document.getElementById('idr-val').textContent = state.idrInterval;
  document.getElementById('rc-mode').value = state.rcMode;
  document.getElementById('deblock-enable').value = state.deblockEnable;
  document.getElementById('alpha-c0').value = state.alphaC0;
  document.getElementById('alpha-val').textContent = state.alphaC0;
  document.getElementById('beta-offset').value = state.betaOffset;
  document.getElementById('beta-val').textContent = state.betaOffset;
}

// ====== Slider Bindings ======
['qp', 'bitrate', 'maxqp', 'idr-interval', 'alpha-c0', 'beta-offset'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    const key = id.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    state[key] = Number(el.value);
    const valId = id === 'bitrate' ? 'bitrate-val' :
                  id === 'idr-interval' ? 'idr-val' :
                  id === 'alpha-c0' ? 'alpha-val' :
                  id === 'beta-offset' ? 'beta-val' :
                  id + '-val';
    const suffix = id === 'bitrate' ? 'k' : '';
    document.getElementById(valId).textContent = el.value + suffix;
    render();
  });
});

// ====== Animation Loop ======
function animate() {
  if (state.motionOn) {
    state.motionT += 1;
    render();
  }
  requestAnimationFrame(animate);
}

// ====== Init ======
syncUI();
render();
animate();
</script>
</body>
</html>
